name: "Testes De Unidade Com Allure Report"

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch
# gatilho agendado = schedule
# gatilho por push = workflow_run
on:
  workflow_dispatch: 
  schedule:
    # cronograma de execução
    # 1 - minuto, 2 - hora, 3 - dia do mês, 4 - mês, 5 - dia da semana
    - cron: "*/15 * * * *"
  push:
    branches:
      - main

# tarefas dentro da pipeline = jobs
jobs:
  # nome do job
  unidade:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: 'npm' # Habilita cache para dependências npm, acelerando execuções futuras
      
      - name: Instalando dependências
        run: npm install 

      - name: Rodando testes unitários
        run: npm run test

  relatorio:
    runs-on: ubuntu-latest
    needs: [unidade]

    steps: 
      - name: Configura histórico do Allure Report
        uses: actions/checkout@v4
        if: always()
        with:
          ref: gh-pages
          path: gh-pages

      - name: Salvando relatório de testes com Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Publicando histórico do Allure Report no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GH_PAGES }}
          publish_branch: gh-pages
          publish_dir: allure-history